<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson — Bento English</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #2563C8; min-height: 100vh; padding-bottom: 60px; }
.header { background: #1a4a9e; padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
.back-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; width: 36px; height: 36px; border-radius: 10px; font-size: 20px; cursor: pointer; flex-shrink: 0; }
.h-info { flex: 1; }
.h-sub   { font-size: 11px; color: rgba(255,255,255,0.65); }
.h-title { font-size: 16px; font-weight: 700; color: #fff; }
.h-step  { background: rgba(255,255,255,0.18); color: #fff; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
.prog-wrap { padding: 10px 20px 0; }
.prog-track { height: 6px; background: rgba(255,255,255,0.25); border-radius: 99px; }
.prog-fill  { height: 100%; background: #fff; border-radius: 99px; transition: width 0.5s; }
.card { background: #fff; border-radius: 16px; margin: 14px 16px 0; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; }
.phase-label { padding: 14px 18px 0; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.phase-dot { width: 8px; height: 8px; border-radius: 50%; }
.section { padding: 12px 18px 20px; }
.pattern-tag { display: inline-block; background: #ddeeff; color: #2563C8; font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; }
.instruction { font-size: 13px; color: #6b7280; margin-bottom: 14px; line-height: 1.5; }
.word-list { display: flex; flex-direction: column; gap: 8px; }
.word-item { border-radius: 12px; overflow: hidden; border: 2px solid #e2e8f0; transition: border-color 0.15s; }
.word-item.selected { border-color: #2563C8; }
.word-item.done     { border-color: #16a34a; }
.word-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; background: #f0f4fb; transition: background 0.15s; }
.word-item.selected .word-row { background: #ddeeff; }
.word-item.done     .word-row { background: #dcfce7; }
.word-text { font-family: Georgia, serif; font-size: 20px; font-weight: 700; color: #1a1a2e; flex: 1; }
.word-item.done .word-text { color: #16a34a; }
.word-icon { font-size: 18px; }
.word-actions { display: none; flex-direction: column; gap: 8px; padding: 10px 12px 12px; background: #f8faff; }
.word-item.selected .word-actions { display: flex; }
.btn-row { display: flex; gap: 8px; }
.act-btn { flex: 1; padding: 11px 8px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.act-btn:active { opacity: 0.7; }
.btn-say   { background: #2563C8; color: #fff; }
.btn-spell { background: #7c3aed; color: #fff; }
.btn-rec   { background: #dc2626; color: #fff; width: 100%; }
.btn-def   { background: #059669; color: #fff; width: 100%; }
.def-box   { display: none; margin-top: 6px; padding: 12px 14px; background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 10px; }
.def-box.show { display: block; }
.def-word  { font-family: Georgia, serif; font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; }
.def-pos   { font-size: 11px; font-weight: 700; color: #059669; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.def-text  { font-size: 13px; color: #374151; line-height: 1.6; margin-bottom: 4px; }
.def-example { font-size: 12px; color: #6b7280; font-style: italic; line-height: 1.5; }
.def-ipa { font-size: 15px; color: #059669; font-family: Georgia, serif; font-weight: 700; letter-spacing: 1px; }
.def-audio-btn { background: #2563C8; color: #fff; border: none; border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-rec.recording { background: #991b1b; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
@keyframes spin  { to{transform:rotate(360deg)} }
.feedback { display: none; margin-top: 6px; padding: 10px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; }
.feedback.show    { display: block; }
.feedback.correct { background: #dcfce7; color: #166534; border: 1.5px solid #16a34a; }
.feedback.wrong   { background: #fee2e2; color: #991b1b; border: 1.5px solid #dc2626; }
.feedback.info    { background: #eff6ff; color: #1e40af; border: 1.5px solid #93c5fd; }
.hw-sentences { background: #f8faff; border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
.hw-sent { font-family: Georgia, serif; font-size: 15px; line-height: 2.2; color: #1a1a2e; padding: 2px 0; border-bottom: 1px dashed #e2e8f0; }
.hw-sent:last-child { border-bottom: none; }
.hw-sent span { font-weight: 700; color: #2563C8; margin-right: 8px; }
.photo-area { border: 2px dashed #2563C8; border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; background: #f0f7ff; margin-bottom: 14px; transition: background 0.15s; }
.photo-area:active { background: #ddeeff; }
.photo-area.has-photo { border-style: solid; border-color: #16a34a; background: #dcfce7; }
.photo-icon  { font-size: 36px; margin-bottom: 8px; }
.photo-label { font-size: 14px; font-weight: 700; color: #2563C8; margin-bottom: 4px; }
.photo-sub   { font-size: 12px; color: #6b7280; }
.photo-preview { width: 100%; border-radius: 10px; margin-bottom: 10px; display: none; max-height: 180px; object-fit: cover; }
.photo-preview.show { display: block; }
#photoInput { display: none; }
.ocr-progress { background: #f0f4fb; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: none; }
.ocr-progress.show { display: block; }
.ocr-bar-track { height: 6px; background: #e2e8f0; border-radius: 99px; margin-top: 8px; }
.ocr-bar-fill  { height: 100%; background: #2563C8; border-radius: 99px; transition: width 0.3s; }
.divider  { height: 1px; background: #e2e8f0; margin: 0 18px 16px; }
.btn-wrap { padding: 0 18px 20px; display: flex; flex-direction: column; gap: 8px; }
.main-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; background: #2563C8; color: #fff; transition: background 0.15s; }
.main-btn:disabled { background: #e2e8f0; color: #9ca3af; cursor: not-allowed; }
.main-btn.green  { background: #16a34a; }
.main-btn.purple { background: #7c3aed; }
.eval-wrap { padding: 20px 18px 24px; }
.score-circle { width: 90px; height: 90px; border-radius: 50%; background: #2563C8; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 12px; }
.score-num   { font-size: 28px; font-weight: 800; line-height: 1; }
.score-label { font-size: 10px; opacity: 0.85; letter-spacing: 1px; }
.eval-msg  { font-size: 14px; color: #1a1a2e; text-align: center; line-height: 1.6; margin-bottom: 16px; }
.ironic-box { background: #fffbeb; border: 1.5px solid #f59e0b; border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; font-size: 13px; color: #92400e; line-height: 1.6; text-align: center; font-style: italic; }
.eval-section { margin-bottom: 18px; }
.eval-title { font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #6b7280; margin-bottom: 10px; }
.trans-word { display: flex; gap: 8px; align-items: center; padding: 7px 12px; border-radius: 8px; background: #f8faff; margin-bottom: 5px; }
.trans-en  { font-family: Georgia, serif; font-weight: 700; color: #1a1a2e; font-size: 14px; flex: 1; }
.trans-arr { color: #2563C8; font-size: 12px; }
.trans-pt  { font-size: 13px; color: #6b7280; flex: 1; }
.trans-sent { padding: 10px 12px; border-radius: 10px; background: #f8faff; margin-bottom: 8px; }
.trans-sent-en { font-family: Georgia, serif; font-size: 14px; color: #1a1a2e; margin-bottom: 4px; }
.trans-sent-pt { font-size: 13px; color: #2563C8; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="goBack()">&#8249;</button>
  <div class="h-info">
    <div class="h-sub" id="hSub">Loading...</div>
    <div class="h-title" id="hTitle">Loading...</div>
  </div>
  <div class="h-step" id="hStep">1 / 4</div>
</div>

<div class="prog-wrap">
  <div class="prog-track">
    <div class="prog-fill" id="pFill" style="width:0%"></div>
  </div>
</div>

<div class="card" id="card">
  <div style="padding:48px 24px;text-align:center">
    <div style="width:36px;height:36px;border:4px solid #e2e8f0;border-top-color:#2563C8;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px"></div>
    <div style="font-size:14px;color:#6b7280">Loading your lesson...</div>
  </div>
</div>

<input type="file" id="photoInput" accept="image/*" capture="environment">

<script>
var SUPABASE_URL  = "https://kqggtikhgzvzreiraosi.supabase.co";
var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxZ2d0aWtoZ3p2enJlaXJhb3NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MTE2ODEsImV4cCI6MjA5ODA4NzY4MX0.K7yVSDxf-uerPJeVjO4huJdEqVmR2Ty3jy1jyYMKk58";
var FN_EVALUATE   = SUPABASE_URL + "/functions/v1/evaluate-pronunciation";
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

var currentUser  = null;
var lesson       = null;
var phase        = "words";
var wordsDone    = {};
var sentsDone    = {};
var hwApproved   = false;
var ocrText      = "";
var selectedIdx  = null;
var recognition  = null;
var wordsCorrect = 0;
var sentsCorrect = 0;

var SESSION_KEY = "bento_session";

function getSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY)) || {}; } catch { return {}; } }
function saveSession() {
  localStorage.setItem(SESSION_KEY, JSON.stringify({
    lessonId: lesson.id, phase: phase, wordsDone: wordsDone,
    sentsDone: sentsDone, hwApproved: hwApproved, ocrText: ocrText,
    selectedIdx: selectedIdx, wordsCorrect: wordsCorrect, sentsCorrect: sentsCorrect
  }));
}
function clearSession() { localStorage.removeItem(SESSION_KEY); }

async function init() {
  var r = await sb.auth.getSession();
  if (!r.data.session) { window.location.href = "login.html"; return; }
  currentUser = r.data.session.user;
  await loadLesson();
}

async function loadLesson() {
  try {
    var sess = getSession();

    document.getElementById("card").innerHTML =
      '<div style="padding:32px;text-align:center;color:#6b7280">Buscando lições no Supabase...</div>';

    var r = await sb.from("lessons")
      .select("*")
      .eq("group_name", "Closed Syllables")
      .like("subgroup", "Short Vowels%");

    if (r.error) {
      document.getElementById("card").innerHTML =
        '<div style="padding:32px;text-align:center;color:#991b1b">Erro no Supabase:<br><br>' +
        r.error.message +
        '</div>';
      return;
    }

    var lessons = r.data || [];

    if (lessons.length === 0) {
      document.getElementById("card").innerHTML =
        '<div style="padding:32px;text-align:center;color:#991b1b">' +
        'Nenhuma lição encontrada.<br><br>' +
        'Filtro usado:<br>' +
        'group_name = Closed Syllables<br>' +
        'subgroup começa com Short Vowels' +
        '</div>';
      return;
    }

    var done = await sb.from("lesson_results")
      .select("lesson_id")
      .eq("student_id", currentUser.id);

    if (done.error) {
      document.getElementById("card").innerHTML =
        '<div style="padding:32px;text-align:center;color:#991b1b">Erro ao buscar progresso:<br><br>' +
        done.error.message +
        '</div>';
      return;
    }

    var doneIds = (done.data || []).map(function(r){ return r.lesson_id; });

    if (sess.lessonId) {
      lesson = lessons.find(function(l){ return l.id === sess.lessonId; });
    }

    if (!lesson) {
      var remaining = lessons.filter(function(l){ return doneIds.indexOf(l.id) === -1; });
      var pool = remaining.length > 0 ? remaining : lessons;
      lesson = pool[Math.floor(Math.random() * pool.length)];
    }

    if (!lesson.words || !lesson.sentences) {
      document.getElementById("card").innerHTML =
        '<div style="padding:32px;text-align:center;color:#991b1b">' +
        'A lição foi encontrada, mas está sem words ou sentences.' +
        '</div>';
      return;
    }

    if (sess.lessonId === lesson.id) {
      phase        = sess.phase        || "words";
      wordsDone    = sess.wordsDone    || {};
      sentsDone    = sess.sentsDone    || {};
      hwApproved   = sess.hwApproved   || false;
      ocrText      = sess.ocrText      || "";
      selectedIdx  = sess.selectedIdx  || null;
      wordsCorrect = sess.wordsCorrect || 0;
      sentsCorrect = sess.sentsCorrect || 0;
    }

    document.getElementById("hSub").textContent = lesson.group_name;
    document.getElementById("hTitle").textContent = lesson.pattern || lesson.subgroup;

    if      (phase === "handwriting") renderHandwriting();
    else if (phase === "sentences")   renderSentences();
    else if (phase === "evaluation")  goEvaluation();
    else                              renderWords();

  } catch (e) {
    document.getElementById("card").innerHTML =
      '<div style="padding:32px;text-align:center;color:#991b1b">' +
      'Erro inesperado:<br><br>' + e.message +
      '</div>';
  }
}

// ── PROGRESS ────────────────────────────────────────────
function updateProgress() {
  var pcts = { words: 0, handwriting: 25, sentences: 50, evaluation: 100 };
  var base = pcts[phase] || 0;
  var extra = 0;
  if (phase === "words")
    extra = Math.round(Object.keys(wordsDone).length / lesson.words.length * 25);
  else if (phase === "sentences")
    extra = Math.round(Object.keys(sentsDone).length / lesson.sentences.length * 25);
  document.getElementById("pFill").style.width = (base + extra) + "%";
}

// ── DICTIONARY API ──────────────────────────────────────
async function defineWord(word, idx) {
  var box = document.getElementById("def" + idx);
  if (!box) return;
  if (box.classList.contains("show")) { box.className = "def-box"; return; }
  box.className = "def-box show";
  box.innerHTML = '<div style="font-size:12px;color:#6b7280">Loading definition...</div>';
  try {
    var res = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + word);
    if (!res.ok) throw new Error("not found");
    var data = await res.json();
    var entry   = data[0];

    // IPA phonetic
    var phonetic = "";
    if (entry.phonetic) {
      phonetic = entry.phonetic;
    } else if (entry.phonetics && entry.phonetics.length > 0) {
      for (var p = 0; p < entry.phonetics.length; p++) {
        if (entry.phonetics[p].text) { phonetic = entry.phonetics[p].text; break; }
      }
    }

    // Audio
    var audioUrl = "";
    if (entry.phonetics) {
      for (var a = 0; a < entry.phonetics.length; a++) {
        if (entry.phonetics[a].audio) { audioUrl = entry.phonetics[a].audio; break; }
      }
    }

    // Definition
    var meaning = entry.meanings[0];
    var def     = meaning.definitions[0];
    var pos     = meaning.partOfSpeech || "";
    var text    = def.definition || "";
    var example = def.example ? '"' + def.example + '"' : "";

    var html = '<div class="def-word">' + word + '</div>';

    // IPA + audio button
    if (phonetic || audioUrl) {
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
      if (phonetic) html += '<div class="def-ipa">' + phonetic + '</div>';
      if (audioUrl) html += '<button class="def-audio-btn" onclick="playAudio('' + audioUrl + '')">🔊 Native</button>';
      html += '</div>';
    }

    if (pos)     html += '<div class="def-pos">' + pos + '</div>';
    if (text)    html += '<div class="def-text">' + text + '</div>';
    if (example) html += '<div class="def-example">' + example + '</div>';

    box.innerHTML = html;
  } catch(e) {
    box.innerHTML = '<div style="font-size:12px;color:#6b7280">No definition found for "' + word + '".</div>';
  }
}

function playAudio(url) {
  if (!url) return;
  var audio = new Audio(url.startsWith("http") ? url : "https:" + url);
  audio.play();
}

// ── TTS ─────────────────────────────────────────────────
function sayWord(word) {
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US"; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
function spellWord(word) {
  window.speechSynthesis.cancel();
  var letters = word.split(""); var i = 0;
  function next() {
    if (i >= letters.length) return;
    var u = new SpeechSynthesisUtterance(letters[i]);
    u.lang = "en-US"; u.rate = 0.8;
    u.onend = function() { i++; setTimeout(next, 250); };
    window.speechSynthesis.speak(u);
  }
  next();
}

// ── RECORDING ───────────────────────────────────────────
function recordItem(idx, btnEl, type) {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showFeedback(idx, "info", "Please use Chrome to record.", type); return; }
  if (recognition) { recognition.stop(); return; }
  btnEl.classList.add("recording"); btnEl.textContent = "Stop";
  recognition = new SR();
  recognition.lang = "en-US"; recognition.interimResults = false; recognition.maxAlternatives = 1;
  var handled = false;
  recognition.onresult = function(e) {
    if (handled) return; handled = true;
    var transcript = e.results[0][0].transcript.trim();
    btnEl.classList.remove("recording"); btnEl.innerHTML = "Record";
    recognition.stop(); recognition = null;
    if (type === "word") evaluateWord(idx, transcript);
    else evaluateSentence(idx, transcript);
  };
  recognition.onerror = function() {
    if (handled) return; handled = true;
    btnEl.classList.remove("recording"); btnEl.innerHTML = "Record";
    recognition = null;
    showFeedback(idx, "info", "Could not hear you. Try a quieter place.", type);
  };
  recognition.onend = function() { btnEl.classList.remove("recording"); btnEl.innerHTML = "Record"; recognition = null; };
  recognition.start();
}

async function evaluateWord(idx, transcript) {
  var word = lesson.words[idx];
  showFeedback(idx, "info", "Evaluating...", "word");
  try {
    var res = await fetch(FN_EVALUATE, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + SUPABASE_ANON },
      body: JSON.stringify({ word: word, transcript: transcript })
    });
    var data = await res.json();
    if (data.correct) {
      showFeedback(idx, "correct", data.feedback, "word");
      wordsDone[idx] = true; wordsCorrect++; saveSession(); renderWords();
    } else {
      showFeedback(idx, "wrong", data.feedback, "word");
    }
  } catch(e) { showFeedback(idx, "info", "Connection error. Try again.", "word"); }
}

async function evaluateSentence(idx, transcript) {
  var sentence = lesson.sentences[idx];
  showFeedback(idx, "info", "Evaluating...", "sent");
  try {
    var res = await fetch(FN_EVALUATE, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + SUPABASE_ANON },
      body: JSON.stringify({ word: sentence, transcript: transcript })
    });
    var data = await res.json();
    if (data.correct) {
      showFeedback(idx, "correct", data.feedback, "sent");
      sentsDone[idx] = true; sentsCorrect++; saveSession(); renderSentences();
    } else {
      showFeedback(idx, "wrong", data.feedback, "sent");
    }
  } catch(e) { showFeedback(idx, "info", "Connection error. Try again.", "sent"); }
}

function showFeedback(idx, type, msg, ctx) {
  var el = document.getElementById((ctx === "sent" ? "sfb" : "fb") + idx);
  if (!el) return;
  el.className = "feedback show " + type;
  el.textContent = msg;
}

// ── PHASE 1: WORDS ──────────────────────────────────────
function renderWords() {
  phase = "words"; updateProgress();
  document.getElementById("hStep").textContent = "1 / 4";
  var count = Object.keys(wordsDone).length;
  var allDone = count === lesson.words.length;
  var html = '<div class="phase-label" style="color:#2563C8"><div class="phase-dot" style="background:#2563C8"></div> Phase 1 - Words</div>';
  html += '<div class="section">';
  html += '<div class="pattern-tag">' + (lesson.pattern || lesson.subgroup) + '</div>';
  html += '<p class="instruction">Tap a word to listen, spell or record your pronunciation.</p>';
  html += '<div class="word-list">';
  for (var i = 0; i < lesson.words.length; i++) {
    var w = lesson.words[i]; var done = wordsDone[i]; var sel = selectedIdx === i && !done;
    var cls = done ? "done" : sel ? "selected" : "";
    html += '<div class="word-item ' + cls + '" id="wi' + i + '">';
    html += '<div class="word-row" onclick="selectWord(' + i + ')">';
    html += '<span class="word-text">' + w + '</span>';
    html += '<span class="word-icon">' + (done ? "✅" : sel ? "▾" : "○") + '</span>';
    html += '</div>';
    if (sel) {
      html += '<div class="word-actions">';
      html += '<div class="btn-row">';
      html += '<button class="act-btn btn-say" onclick="sayWord(\'' + w + '\')">🔊 Listen</button>';
      html += '<button class="act-btn btn-spell" onclick="spellWord(\'' + w + '\')">🔤 Spell</button>';
      html += '</div>';
      html += '<button class="act-btn btn-rec" id="rec' + i + '" onclick="recordItem(' + i + ', this, \'word\')">🎙 Record</button>';
      html += '<button class="act-btn btn-def" onclick="defineWord(\''+w+'\', '+i+')">📖 Define</button>';
      html += '<div class="def-box" id="def' + i + '"></div>';
      html += '<div class="feedback" id="fb' + i + '"></div>';
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div></div><div class="divider"></div>';
  html += '<div class="btn-wrap"><button class="main-btn" onclick="goHandwriting()" ' + (allDone ? "" : "disabled") + '>Next: Handwriting &#8594;</button></div>';
  document.getElementById("card").innerHTML = html;
}

function selectWord(i) {
  if (wordsDone[i]) return;
  selectedIdx = selectedIdx === i ? null : i;
  renderWords();
  if (selectedIdx !== null) {
    setTimeout(function() {
      var el = document.getElementById("wi" + i);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 60);
  }
}

// ── PHASE 2: HANDWRITING ────────────────────────────────
function goHandwriting() {
  if (Object.keys(wordsDone).length < lesson.words.length) return;
  phase = "handwriting"; saveSession(); renderHandwriting();
}

function renderHandwriting() {
  phase = "handwriting"; updateProgress();
  document.getElementById("hStep").textContent = "2 / 4";
  var html = '<div class="phase-label" style="color:#7c3aed"><div class="phase-dot" style="background:#7c3aed"></div> Phase 2 - Handwriting</div>';
  html += '<div class="section">';
  html += '<p class="instruction">Copy all sentences below by hand on paper. Then take a photo.</p>';
  html += '<div class="hw-sentences">';
  for (var i = 0; i < lesson.sentences.length; i++) {
    html += '<div class="hw-sent"><span>' + (i+1) + '.</span>' + lesson.sentences[i] + '</div>';
  }
  html += '</div>';
  if (hwApproved) {
    html += '<div style="background:#dcfce7;border:1.5px solid #16a34a;border-radius:12px;padding:16px;text-align:center;margin-bottom:14px">';
    html += '<div style="font-size:28px;margin-bottom:6px">✅</div>';
    html += '<div style="font-weight:700;color:#166534;font-size:15px">Photo approved!</div>';
    html += '<div style="font-size:12px;color:#6b7280;margin-top:4px">You can move on to the sentences</div>';
    html += '</div>';
  } else {
    html += '<div class="photo-area" id="photoArea" onclick="openCamera()">';
    html += '<div class="photo-icon">📷</div>';
    html += '<div class="photo-label">Take a photo of your writing</div>';
    html += '<div class="photo-sub">Make sure all sentences appear in the photo</div>';
    html += '</div>';
    html += '<img class="photo-preview" id="photoPreview">';
    html += '<div class="ocr-progress" id="ocrProgress">';
    html += '<div style="font-size:13px;color:#1e40af;font-weight:600" id="ocrStatus">Reading your handwriting...</div>';
    html += '<div class="ocr-bar-track"><div class="ocr-bar-fill" id="ocrBar" style="width:0%"></div></div>';
    html += '</div>';
    html += '<div class="feedback" id="hwFeedback"></div>';
  }
  html += '</div><div class="divider"></div>';
  html += '<div class="btn-wrap"><button class="main-btn purple" onclick="goSentences()" ' + (hwApproved ? "" : "disabled") + '>Next: Read Aloud &#8594;</button></div>';
  document.getElementById("card").innerHTML = html;
}

function openCamera() { document.getElementById("photoInput").click(); }

document.getElementById("photoInput").addEventListener("change", function(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var dataUrl = ev.target.result;
    var preview = document.getElementById("photoPreview");
    if (preview) { preview.src = dataUrl; preview.className = "photo-preview show"; }
    var area = document.getElementById("photoArea");
    if (area) area.className = "photo-area has-photo";
    runOCR(dataUrl);
  };
  reader.readAsDataURL(file);
});

function normalize(str) { return str.toLowerCase().replace(/[^a-z0-9 ]/g, " ").replace(/\s+/g, " ").trim(); }
function similarity(a, b) {
  a = normalize(a); b = normalize(b);
  var wa = a.split(" "); var wb = b.split(" ");
  var matched = wa.filter(function(w) { return w.length > 2 && wb.indexOf(w) !== -1; });
  return matched.length / Math.max(wa.length, 1);
}

function runOCR(dataUrl) {
  var prog = document.getElementById("ocrProgress");
  var bar  = document.getElementById("ocrBar");
  var status = document.getElementById("ocrStatus");
  var fb   = document.getElementById("hwFeedback");
  if (prog) prog.className = "ocr-progress show";
  Tesseract.recognize(dataUrl, "eng", {
    logger: function(m) {
      if (m.status === "recognizing text" && bar) {
        var pct = Math.round(m.progress * 100);
        bar.style.width = pct + "%";
        if (status) status.textContent = "Reading your handwriting... " + pct + "%";
      }
    }
  }).then(function(result) {
    if (prog) prog.className = "ocr-progress";
    ocrText = result.data.text;
    var missing = [];
    for (var i = 0; i < lesson.sentences.length; i++) {
      if (similarity(lesson.sentences[i], ocrText) < 0.5) missing.push(i + 1);
    }
    if (missing.length === 0) {
      hwApproved = true; saveSession(); renderHandwriting();
    } else {
      if (fb) { fb.className = "feedback show wrong"; fb.textContent = "Could not find sentences " + missing.join(", ") + ". Make sure all are visible and try again."; }
    }
  }).catch(function() {
    if (prog) prog.className = "ocr-progress";
    if (fb) { fb.className = "feedback show wrong"; fb.textContent = "Could not read the photo. Try better lighting."; }
  });
}

// ── PHASE 3: SENTENCES ──────────────────────────────────
function goSentences() {
  if (!hwApproved) return;
  phase = "sentences"; saveSession(); renderSentences();
}

function renderSentences() {
  phase = "sentences"; updateProgress();
  document.getElementById("hStep").textContent = "3 / 4";
  var allDone = Object.keys(sentsDone).length === lesson.sentences.length;
  var html = '<div class="phase-label" style="color:#dc2626"><div class="phase-dot" style="background:#dc2626"></div> Phase 3 - Read Aloud</div>';
  html += '<div class="section">';
  html += '<p class="instruction">Record yourself reading each sentence aloud.</p>';
  for (var i = 0; i < lesson.sentences.length; i++) {
    var done = sentsDone[i];
    html += '<div style="border-radius:12px;overflow:hidden;border:2px solid ' + (done ? "#16a34a" : "#e2e8f0") + ';margin-bottom:8px">';
    html += '<div style="display:flex;gap:10px;align-items:flex-start;background:' + (done ? "#dcfce7" : "#f0f4fb") + ';padding:12px 14px">';
    html += '<span style="font-size:12px;font-weight:700;color:' + (done ? "#16a34a" : "#2563C8") + ';min-width:20px;padding-top:2px">' + (i+1) + '.</span>';
    html += '<span style="font-family:Georgia,serif;font-size:15px;line-height:1.6;color:#1a1a2e;flex:1">' + lesson.sentences[i] + '</span>';
    html += '<span style="font-size:16px;opacity:' + (done ? "1" : "0") + '">✅</span>';
    html += '</div>';
    if (!done) {
      html += '<div style="padding:10px 12px 12px;background:#f8faff">';
      html += '<button class="act-btn btn-rec" id="srec' + i + '" onclick="recordItem(' + i + ', this, \'sent\')" style="width:100%">🎙 Record Sentence</button>';
      html += '<div class="feedback" id="sfb' + i + '"></div>';
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div><div class="divider"></div>';
  html += '<div class="btn-wrap"><button class="main-btn green" onclick="goEvaluation()" ' + (allDone ? "" : "disabled") + '>See Final Evaluation &#8594;</button></div>';
  document.getElementById("card").innerHTML = html;
}

// ── PHASE 4: EVALUATION ─────────────────────────────────
function goEvaluation() {
  if (Object.keys(sentsDone).length < lesson.sentences.length) return;
  phase = "evaluation"; saveSession();
  document.getElementById("hStep").textContent = "4 / 4";
  document.getElementById("pFill").style.width = "90%";
  document.getElementById("card").innerHTML = '<div style="padding:48px 24px;text-align:center"><div style="width:36px;height:36px;border:4px solid #e2e8f0;border-top-color:#2563C8;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px"></div><div style="font-size:14px;color:#6b7280">Generating your final evaluation...</div></div>';
  fetchEvaluation();
}

async function fetchEvaluation() {
  var wordList = lesson.words.join(", ");
  var sentList = lesson.sentences.map(function(s,i){ return (i+1)+". "+s; }).join(" | ");
  var ocrSample = ocrText ? ocrText.substring(0, 200) : "not available";
  var prompt = "You are Bento, a fun English phonics teacher. Lesson just completed.\nWords: " + wordList + "\nSentences: " + sentList + "\nOCR of handwriting: \"" + ocrSample + "\"\n\nTasks:\n1. Translate all words to Portuguese (Brazil)\n2. Translate all sentences to Portuguese (Brazil)\n3. Write a short encouraging evaluation in Portuguese (2-3 sentences)\n4. Write ONE ironic funny comment in Portuguese about the handwriting based on OCR (e.g. NASA, archaeologists, ancient scripts, doctor prescription style). Be creative.\n\nRespond ONLY with JSON:\n{\"evaluation\":\"text\",\"ironic\":\"comment\",\"score\":85,\"word_translations\":{\"cab\":\"taxi\"},\"sentence_translations\":[\"trans1\",\"trans2\"]}";

  var score = Math.round(((wordsCorrect / Math.max(lesson.words.length,1)) * 0.5 + (sentsCorrect / Math.max(lesson.sentences.length,1)) * 0.5) * 100);

  try {
    var res = await fetch(FN_EVALUATE, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + SUPABASE_ANON },
      body: JSON.stringify({ word: "__eval__", transcript: prompt, mode: "evaluation" })
    });
    var data = await res.json();
    var evalData = {
      evaluation: data.evaluation || "Great work completing this lesson!",
      ironic: data.ironic || "As soon as NASA deciphers what was written, I will forward it to your email...",
      score: data.score || score,
      word_translations: data.word_translations || {},
      sentence_translations: data.sentence_translations || []
    };
    await saveResult(evalData.score);
    renderEvaluation(evalData);
  } catch(e) {
    var fallback = { evaluation: "Congratulations on completing the lesson!", ironic: "The archaeologists are on their way to decipher your writing...", score: score, word_translations: {}, sentence_translations: [] };
    await saveResult(score);
    renderEvaluation(fallback);
  }
}

async function saveResult(score) {
  await sb.from("lesson_results").insert({
    student_id:    currentUser.id,
    lesson_id:     lesson.id,
    score:         score,
    words_correct: wordsCorrect,
    words_total:   lesson.words.length,
    sents_correct: sentsCorrect,
    sents_total:   lesson.sentences.length,
    ocr_text:      ocrText.substring(0, 500)
  });
}

function renderEvaluation(data) {
  document.getElementById("pFill").style.width = "100%";
  document.getElementById("hStep").textContent = "✓";
  clearSession();
  var html = '<div class="eval-wrap">';
  html += '<div style="text-align:center;margin-bottom:20px">';
  html += '<div class="score-circle"><div class="score-num">' + (data.score||0) + '</div><div class="score-label">SCORE</div></div>';
  html += '<div class="eval-msg">' + data.evaluation + '</div>';
  html += '</div>';
  html += '<div class="ironic-box">✏️ ' + data.ironic + '</div>';
  html += '<div class="eval-section"><div class="eval-title">Lesson Vocabulary</div>';
  for (var i = 0; i < lesson.words.length; i++) {
    var w = lesson.words[i];
    var tr = data.word_translations ? (data.word_translations[w] || "...") : "...";
    html += '<div class="trans-word"><span class="trans-en">' + w + '</span><span class="trans-arr">&#8594;</span><span class="trans-pt">' + tr + '</span></div>';
  }
  html += '</div>';
  html += '<div class="eval-section"><div class="eval-title">Lesson Sentences</div>';
  for (var j = 0; j < lesson.sentences.length; j++) {
    var tr2 = data.sentence_translations[j] || "...";
    html += '<div class="trans-sent"><div class="trans-sent-en">' + lesson.sentences[j] + '</div><div class="trans-sent-pt">&#8594; ' + tr2 + '</div></div>';
  }
  html += '</div>';
  html += '<div class="btn-wrap"><button class="main-btn green" onclick="goBack()">Back to Dashboard</button><button class="main-btn purple" style="margin-top:0" onclick="nextLesson()">Next Lesson &#8594;</button></div>';
  html += '</div>';
  document.getElementById("card").innerHTML = html;
}

function nextLesson() {
  wordsDone = {}; sentsDone = {}; hwApproved = false;
  ocrText = ""; selectedIdx = null; phase = "words";
  wordsCorrect = 0; sentsCorrect = 0;
  clearSession(); lesson = null; init();
}
function goBack() { window.location.href = "index.html"; }

init();
</script>
