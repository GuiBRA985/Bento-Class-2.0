<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bento English — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #2563C8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.logo-wrap {
  text-align: center;
  margin-bottom: 32px;
}
.logo {
  background: #fff;
  color: #2563C8;
  font-size: 32px;
  font-weight: 900;
  font-family: Georgia, serif;
  width: 72px; height: 72px;
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.logo-title { font-size: 22px; font-weight: 800; color: #fff; }
.logo-sub   { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 4px; }

.card {
  background: #fff;
  border-radius: 20px;
  padding: 28px 24px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.tabs {
  display: flex;
  background: #f0f4fb;
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 24px;
}
.tab {
  flex: 1; padding: 8px;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  background: transparent; color: #6b7280;
  transition: all 0.15s;
}
.tab.active { background: #fff; color: #2563C8; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 12px; font-weight: 700;
  color: #374151; margin-bottom: 6px; letter-spacing: 0.3px;
}
.field input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid #e2e8f0; border-radius: 10px;
  font-size: 15px; font-family: inherit; outline: none;
  transition: border-color 0.15s;
}
.field input:focus { border-color: #2563C8; }

.submit-btn {
  width: 100%; padding: 14px;
  background: #2563C8; color: #fff;
  border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  transition: background 0.15s;
  margin-top: 4px;
}
.submit-btn:hover { background: #1a4a9e; }
.submit-btn:disabled { background: #e2e8f0; color: #9ca3af; cursor: not-allowed; }

.msg {
  margin-top: 14px; padding: 10px 14px;
  border-radius: 8px; font-size: 13px;
  display: none;
}
.msg.error   { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
.msg.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #86efac; }
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo">B</div>
  <div class="logo-title">Bento English</div>
  <div class="logo-sub">Phonics Learning Platform</div>
</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <div id="loginForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="submit-btn" onclick="login()">Sign In</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- SIGNUP -->
  <div id="signupForm" style="display:none">
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="signupName" placeholder="John Smith">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signupPass" placeholder="At least 6 characters" autocomplete="new-password">
    </div>
    <button class="submit-btn" onclick="signup()">Create Account</button>
    <div class="msg" id="signupMsg"></div>
  </div>
</div>

<script>
var SUPABASE_URL  = "https://kqggtikhgzvzreiraosi.supabase.co";
var SUPABASE_ANON = "SUA-ANON-KEY";
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Redirect if already logged in
sb.auth.getSession().then(function(r) {
  if (r.data.session) window.location.href = "index.html";
});

function switchTab(tab) {
  document.getElementById("loginForm").style.display  = tab === "login"  ? "block" : "none";
  document.getElementById("signupForm").style.display = tab === "signup" ? "block" : "none";
  document.querySelectorAll(".tab").forEach(function(t, i) {
    t.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
  });
}

async function login() {
  var email = document.getElementById("loginEmail").value.trim();
  var pass  = document.getElementById("loginPass").value;
  var msg   = document.getElementById("loginMsg");
  if (!email || !pass) { showMsg(msg, "error", "Please fill in all fields."); return; }
  var btn = document.querySelector("#loginForm .submit-btn");
  btn.disabled = true; btn.textContent = "Signing in...";
  var r = await sb.auth.signInWithPassword({ email: email, password: pass });
  if (r.error) {
    showMsg(msg, "error", "Invalid email or password.");
    btn.disabled = false; btn.textContent = "Sign In";
  } else {
    window.location.href = "index.html";
  }
}

async function signup() {
  var name  = document.getElementById("signupName").value.trim();
  var email = document.getElementById("signupEmail").value.trim();
  var pass  = document.getElementById("signupPass").value;
  var msg   = document.getElementById("signupMsg");
  if (!name || !email || !pass) { showMsg(msg, "error", "Please fill in all fields."); return; }
  if (pass.length < 6) { showMsg(msg, "error", "Password must be at least 6 characters."); return; }
  var btn = document.querySelector("#signupForm .submit-btn");
  btn.disabled = true; btn.textContent = "Creating account...";

  // Create auth user (no email confirmation)
  var r = await sb.auth.signUp({
    email: email,
    password: pass,
    options: { data: { name: name } }
  });

  if (r.error) {
    showMsg(msg, "error", r.error.message);
    btn.disabled = false; btn.textContent = "Create Account";
    return;
  }

  // Insert into students table
  await sb.from("students").insert({ id: r.data.user.id, name: name });

  window.location.href = "index.html";
}

function showMsg(el, type, text) {
  el.className = "msg " + type;
  el.textContent = text;
}

// Enter key support
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    if (document.getElementById("loginForm").style.display !== "none") login();
    else signup();
  }
});
</script>
</body>
</html>
