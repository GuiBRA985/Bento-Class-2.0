<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard — Bento English</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; min-height: 100vh; padding-bottom: 40px; }
.header { background: #1e293b; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; }
.header h1 { color: #fff; font-size: 18px; font-weight: 800; }
.header p  { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 2px; }
.logout-btn { background: rgba(255,255,255,0.08); border: none; color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.content { padding: 20px 16px; max-width: 700px; margin: 0 auto; }
.stat-row { display: flex; gap: 10px; margin-bottom: 20px; }
.stat-box { flex: 1; background: #1e293b; border-radius: 14px; padding: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
.stat-n { font-size: 28px; font-weight: 800; color: #3b82f6; }
.stat-l { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.section-title { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 10px; }
.student-card { background: #1e293b; border-radius: 14px; padding: 16px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.06); }
.student-name { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 10px; }
.s-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.s-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.s-blue   { background: rgba(59,130,246,0.15); color: #60a5fa; }
.s-green  { background: rgba(34,197,94,0.15);  color: #4ade80; }
.s-yellow { background: rgba(234,179,8,0.15);  color: #fbbf24; }
.lesson-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
.l-pattern { color: #fff; font-weight: 600; flex: 1; font-family: Georgia, serif; font-size: 14px; }
.l-score   { font-weight: 700; font-size: 14px; }
.l-date    { color: rgba(255,255,255,0.25); font-size: 11px; }
.l-good    { color: #4ade80; }
.l-ok      { color: #fbbf24; }
.l-bad     { color: #f87171; }
.empty-msg { color: rgba(255,255,255,0.25); font-size: 13px; padding: 10px 0; }
.refresh-btn { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 16px; }
.spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🎓 Teacher Dashboard</h1>
    <p>Bento English — Student Progress</p>
  </div>
  <button class="logout-btn" onclick="logout()">Sign Out</button>
</div>

<div class="content">
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>

  <div class="stat-row">
    <div class="stat-box"><div class="stat-n" id="statStudents">—</div><div class="stat-l">Students</div></div>
    <div class="stat-box"><div class="stat-n" id="statLessons">—</div><div class="stat-l">Lessons</div></div>
    <div class="stat-box"><div class="stat-n" id="statAvg">—</div><div class="stat-l">Avg Score</div></div>
  </div>

  <div class="section-title">Student Results</div>
  <div id="container">
    <div class="spinner"></div>
  </div>
</div>

<script>
var SUPABASE_URL  = "https://kqggtikhgzvzreiraosi.supabase.co";
var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxZ2d0aWtoZ3p2enJlaXJhb3NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MTE2ODEsImV4cCI6MjA5ODA4NzY4MX0.K7yVSDxf-uerPJeVjO4huJdEqVmR2Ty3jy1jyYMKk58";
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function init() {
  var r = await sb.auth.getSession();
  if (!r.data.session) { window.location.href = "login.html"; return; }
  loadData();
}

async function loadData() {
  document.getElementById("container").innerHTML = '<div class="spinner"></div>';
  try {
    var students = await sb.from("students").select("*").order("created_at");
    var results  = await sb.from("lesson_results")
      .select("*, lessons(group_name,subgroup,pattern)")
      .order("completed_at", { ascending: false });

    var sData = students.data || [];
    var rData = results.data  || [];

    var totalLessons = rData.length;
    var avgScore = totalLessons > 0 ? Math.round(rData.reduce(function(a,r){ return a+(r.score||0); },0)/totalLessons) : 0;

    document.getElementById("statStudents").textContent = sData.length;
    document.getElementById("statLessons").textContent  = totalLessons;
    document.getElementById("statAvg").textContent      = avgScore || "—";

    if (sData.length === 0) {
      document.getElementById("container").innerHTML = '<div class="empty-msg">No students yet.</div>';
      return;
    }

    var html = "";
    sData.forEach(function(student) {
      var sRes = rData.filter(function(r){ return r.student_id === student.id; });
      var sAvg = sRes.length > 0 ? Math.round(sRes.reduce(function(a,r){ return a+(r.score||0); },0)/sRes.length) : 0;
      var totalWords = sRes.reduce(function(a,r){ return a+(r.words_total||0); },0);

      html += '<div class="student-card">';
      html += '<div class="student-name">👤 ' + student.name + '</div>';
      html += '<div class="s-badges">';
      html += '<span class="s-badge s-blue">' + sRes.length + ' lessons</span>';
      if (totalWords > 0) html += '<span class="s-badge s-blue">' + totalWords + ' words</span>';
      if (sAvg > 0) html += '<span class="s-badge ' + (sAvg >= 80 ? "s-green" : sAvg >= 60 ? "s-yellow" : "s-bad") + '">' + sAvg + ' avg</span>';
      html += '</div>';

      if (sRes.length === 0) {
        html += '<div class="empty-msg">No lessons completed yet.</div>';
      } else {
        sRes.slice(0, 8).forEach(function(r) {
          var l    = r.lessons || {};
          var date = new Date(r.completed_at).toLocaleDateString("en-US", { month: "short", day: "numeric" });
          var scoreClass = r.score >= 80 ? "l-good" : r.score >= 60 ? "l-ok" : "l-bad";
          html += '<div class="lesson-row">';
          html += '<span class="l-pattern">' + (l.pattern || l.subgroup || "—") + '</span>';
          html += '<span class="l-score ' + scoreClass + '">' + (r.score||0) + ' pts</span>';
          html += '<span class="l-date">' + date + '</span>';
          html += '</div>';
        });
        if (sRes.length > 8) html += '<div class="empty-msg" style="padding-top:6px">+ ' + (sRes.length-8) + ' more lessons</div>';
      }
      html += '</div>';
    });

    document.getElementById("container").innerHTML = html;
  } catch(e) {
    document.getElementById("container").innerHTML = '<div class="empty-msg">Error: ' + e.message + '</div>';
  }
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = "login.html";
}

init();
</script>
</body>
</html>
