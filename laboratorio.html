<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bento Lab v2 — I'm Rich</title>
    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #0b1a2e;
            --bg-card: #112b45;
            --surface: #1a3a5a;
            --text: #e8f0fe;
            --text-dim: #8aa4c8;
            --primary: #4f9fff;
            --primary-dark: #2a7ae0;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --radius: 16px;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            --transition: 0.25s ease;
        }
        html {
            font-size: 16px;
        }
        body {
            font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 40px;
        }
        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 8px;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--bg-card);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid rgba(79, 159, 255, 0.15);
            position: sticky;
            top: 0;
            z-index: 30;
            backdrop-filter: blur(12px);
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-brand h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .header-brand h1 span {
            color: var(--primary);
        }
        .header-brand small {
            font-size: 12px;
            color: var(--text-dim);
            display: block;
            margin-top: 1px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header-actions button {
            background: rgba(79, 159, 255, 0.15);
            border: none;
            color: var(--text);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-actions button:hover {
            background: rgba(79, 159, 255, 0.3);
            transform: translateY(-1px);
        }
        .header-actions .btn-danger {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
        }
        .header-actions .btn-danger:hover {
            background: rgba(248, 113, 113, 0.3);
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* ===== WORLD SELECTOR ===== */
        .world-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .world-card {
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: var(--radius);
            padding: 16px 18px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .world-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }
        .world-card.active {
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 2px rgba(79, 159, 255, 0.2);
        }
        .world-card .icon {
            font-size: 28px;
            display: block;
            margin-bottom: 4px;
        }
        .world-card .title {
            font-weight: 700;
            font-size: 16px;
        }
        .world-card .desc {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
            line-height: 1.4;
        }
        .world-card .badge {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 10px;
            background: var(--primary);
            color: #fff;
            padding: 2px 10px;
            border-radius: 40px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .world-card .badge.soon {
            background: var(--warning);
            color: #1a1a1a;
        }

        /* ===== GAME LAYOUT ===== */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
        }
        @media (max-width: 860px) {
            .game-layout {
                grid-template-columns: 1fr;
            }
        }

        /* ===== SCENE ===== */
        .scene {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 18px;
            min-height: 460px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .scene-top {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .money-box {
            background: #064e3b;
            color: #a7f3d0;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .satisfaction-wrap {
            flex: 1;
            min-width: 120px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .satisfaction-track {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            overflow: hidden;
        }
        .satisfaction-fill {
            height: 100%;
            width: 70%;
            border-radius: 40px;
            transition: width 0.5s ease, background 0.3s;
        }
        .sat-label {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            min-width: 80px;
            color: var(--text-dim);
        }

        /* ===== LOT ===== */
        .lot {
            background: linear-gradient(145deg, #1a3a5a, #0d2238);
            border-radius: 12px;
            min-height: 320px;
            position: relative;
            border: 2px solid rgba(79, 159, 255, 0.08);
            overflow: hidden;
        }
        .lot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            padding: 12px;
            min-height: 260px;
        }
        .lot-cell {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-dim);
            transition: var(--transition);
            border: 1px dashed rgba(255, 255, 255, 0.06);
            padding: 6px;
            text-align: center;
        }
        .lot-cell.has-item {
            border-color: rgba(79, 159, 255, 0.25);
            background: rgba(79, 159, 255, 0.08);
            color: var(--text);
        }
        .lot-cell .emoji {
            font-size: 28px;
            line-height: 1.2;
        }
        .lot-cell .label {
            font-size: 9px;
            opacity: 0.7;
            margin-top: 2px;
            word-break: break-word;
        }

        /* ===== CLIENT SPEECH ===== */
        .client-bubble {
            background: var(--surface);
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 12px;
            border-left: 4px solid var(--primary);
            font-size: 14px;
            line-height: 1.5;
            min-height: 52px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }
        .client-bubble .avatar {
            font-size: 32px;
            flex-shrink: 0;
        }
        .client-bubble .speech-text {
            flex: 1;
        }
        .client-bubble .speech-text em {
            color: var(--text-dim);
            font-style: italic;
            font-size: 13px;
        }

        /* ===== PANEL (SIDE) ===== */
        .panel {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 620px;
        }
        .panel-head {
            padding: 14px 16px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .panel-head h3 {
            font-size: 16px;
            font-weight: 700;
        }
        .panel-head p {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .panel-tabs {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            overflow-x: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }
        .panel-tabs button {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .panel-tabs button:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }
        .panel-tabs button.active {
            background: var(--primary);
            color: #fff;
        }
        .panel-shop {
            padding: 12px;
            overflow-y: auto;
            flex: 1;
        }
        .shop-item {
            background: var(--surface);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .shop-item:hover {
            border-color: rgba(79, 159, 255, 0.15);
        }
        .shop-item.owned {
            opacity: 0.6;
            border-color: var(--success);
        }
        .shop-item .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .shop-item .name {
            font-weight: 600;
            font-size: 14px;
        }
        .shop-item .price {
            font-size: 13px;
            color: var(--warning);
            font-weight: 700;
        }
        .shop-item .desc {
            font-size: 12px;
            color: var(--text-dim);
            margin: 4px 0 8px;
            line-height: 1.4;
        }
        .shop-item .actions {
            display: flex;
            gap: 8px;
        }
        .shop-item .actions button {
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-buy {
            background: var(--primary);
            color: #fff;
        }
        .btn-buy:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: scale(1.02);
        }
        .btn-buy:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-listen {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }
        .btn-listen:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        /* ===== VOCAB BOX ===== */
        .vocab-box {
            padding: 10px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            max-height: 100px;
            overflow-y: auto;
        }
        .vocab-box .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            font-weight: 700;
        }
        .vocab-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }
        .vocab-tags span {
            background: rgba(79, 159, 255, 0.15);
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
        }

        /* ===== LOG ===== */
        .log-box {
            padding: 8px 16px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }
        .log-box .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            font-weight: 700;
        }
        .log-entries {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 8px 10px;
            max-height: 80px;
            overflow-y: auto;
            font-size: 12px;
            font-family: 'SF Mono', monospace;
            color: var(--text-dim);
            line-height: 1.6;
            margin-top: 4px;
        }
        .log-entries .entry-time {
            color: var(--text-dim);
            opacity: 0.5;
            margin-right: 6px;
        }
        .log-entries .entry-client {
            color: var(--warning);
        }

        /* ===== QUIZ OVERLAY ===== */
        .quiz-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        .quiz-overlay.show {
            display: flex;
        }
        .quiz-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow);
            animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .quiz-card h2 {
            font-size: 20px;
            margin-bottom: 6px;
        }
        .quiz-card p {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .quiz-options button {
            background: var(--surface);
            border: 2px solid transparent;
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
        }
        .quiz-options button:hover {
            border-color: var(--primary);
            background: rgba(79, 159, 255, 0.08);
        }
        .quiz-options button.correct {
            border-color: var(--success);
            background: rgba(52, 211, 153, 0.12);
        }
        .quiz-options button.wrong {
            border-color: var(--danger);
            background: rgba(248, 113, 113, 0.12);
        }
        .quiz-feedback {
            margin-top: 14px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .quiz-feedback.show {
            display: block;
        }
        .quiz-feedback.success {
            background: rgba(52, 211, 153, 0.12);
            color: var(--success);
        }
        .quiz-feedback.fail {
            background: rgba(248, 113, 113, 0.12);
            color: var(--danger);
        }
        .quiz-close {
            margin-top: 16px;
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
        }
        .quiz-close:hover {
            background: var(--primary-dark);
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            padding: 8px 0 16px;
            font-size: 13px;
            color: var(--text-dim);
        }
        .stats-bar strong {
            color: var(--text);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .header {
                padding: 12px 16px;
            }
            .header-brand h1 {
                font-size: 16px;
            }
            .header-actions button {
                font-size: 11px;
                padding: 6px 12px;
            }
            .game-layout {
                gap: 14px;
            }
            .panel {
                max-height: 500px;
            }
            .quiz-card {
                padding: 20px;
            }
            .lot-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

            <button onclick="helpTip()">💡 Dica</button>

    </header>
